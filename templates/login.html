{% extends 'base.html' %}
{% block title %}Login — QuizMaster{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card fade-in">

    <div class="auth-logo">
      <div class="logo-icon">🎯</div>
      <h1>QuizMaster</h1>
      <p>Sign in to continue your learning journey</p>
    </div>

    <form method="POST" action="{{ url_for('login') }}" id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="identifier">Username or Email</label>
        <input
          type="text"
          id="identifier"
          name="identifier"
          class="form-control"
          placeholder="Enter your username or email"
          autocomplete="username"
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-control"
          placeholder="Enter your password"
          autocomplete="current-password"
          required
        >
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">
        🔐 Sign In
      </button>
    </form>

    <div class="auth-divider">or</div>

    <div class="auth-footer">
      Don't have an account?
      <a href="{{ url_for('register') }}">Create one free →</a>
    </div>

    <div class="auth-footer mt-2" style="margin-top:12px; font-size:0.78rem; color: var(--text-muted);">
      Demo: <strong style="color:var(--accent-light)">admin</strong> / <strong style="color:var(--accent-light)">admin123</strong>
    </div>

  </div>
</div>
{% endblock %}
